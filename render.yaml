# Render blueprint — provisions the lightweight Node backend and static
# frontend on Render's free tier. The heavy Python detection service lives on
# Hugging Face Spaces (free CPU Basic, 16 GB RAM); see README → Deploying.
#
# After the first deploy, fill in the cross-service URLs in each service's
# Environment tab:
#   govt-id-backend  → DETECTION_URL = https://<you>-govt-id-detection.hf.space
#   govt-id-backend  → CORS_ORIGIN   = https://govt-id-frontend.onrender.com
#   govt-id-frontend → VITE_API_URL  = https://govt-id-backend.onrender.com
# Then trigger a redeploy on each so the new env vars take effect.

services:
  - type: web
    name: govt-id-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 20.18.0
      - key: DETECTION_URL
        sync: false        # set after creating the HF Space
      - key: CORS_ORIGIN
        sync: false        # set to the frontend's https URL
      - key: DETECTION_TIMEOUT_MS
        value: "60000"
      - key: MAX_IMAGE_SIZE_MB
        value: "10"

  - type: web
    name: govt-id-frontend
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false        # set to the backend's https URL after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
